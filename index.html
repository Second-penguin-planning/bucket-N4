<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JLPT Kanji Bucket Trainer</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>JLPT Kanji Trainer</h1>
<p>N5 + N4 | English / Tagalog</p>

<input id="username" placeholder="Your name" onkeypress="if(event.key==='Enter') startUser()">
<button onclick="startUser()">Start</button>

<div id="progressBar" role="progressbar" style="width:0%"></div>

<p id="progressText"></p>
<p id="score"></p>

<div id="card" class="card">

<h2 id="kanji">漢</h2>

<p id="reading" class="hidden"></p>
<p id="meaning" class="hidden"></p>

<button onclick="showAnswer()" id="showBtn" disabled>Show Answer</button>

</div>
<div id="teacherPanel">

<h3>Teacher Dashboard</h3>

<button onclick="showTeacher()">Teacher Mode</button>

<div id="teacher"></div>

</div>
<div class="buttons">

<button onclick="answer(1)" class="answerBtn" disabled>Easy</button>
<button onclick="answer(2)" class="answerBtn" disabled>OK</button>
<button onclick="answer(3)" class="answerBtn" disabled>Hard</button>
<button onclick="answer(4)" class="answerBtn" disabled>Don't Know</button>

</div>

<div id="stats">

<h3>Bucket 4 (Don't Know)</h3>
<div id="bucket4"></div>

<h3>Bucket 3 (Hard)</h3>
<div id="bucket3"></div>

<h3>Bucket 2 (OK)</h3>
<div id="bucket2"></div>

<h3>Bucket 1 (Easy)</h3>
<div id="bucket1"></div>

</div>

<div id="teacherPanel">
<button onclick="showTeacher()">Teacher Mode</button>
<div id="teacher"></div>
</div>

<script src="app.js"></script>

</body>
</html>
