<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JLPT Kanji Bucket Trainer</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>
<input id="username" placeholder="Your name">
<button onclick="startUser()">Start</button>
<h1>JLPT Kanji Trainer</h1>
  <div id="progressBox">
<div id="progressBar"></div>
</div>

<p id="progressText"></p>
<p>N5 + N4 | English / Tagalog</p>

<div id="card">

<h2 id="kanji">漢</h2>

<p id="reading" class="hidden"></p>
<p id="meaning" class="hidden"></p>

<button onclick="showAnswer()">Show Answer</button>
</div>
<input id="username" placeholder="Your name">
<button onclick="startUser()">Start</button>
<div class="buttons">

<button onclick="answer(1)">Easy</button>
<button onclick="answer(2)">OK</button>
<button onclick="answer(3)">Hard</button>
<button onclick="answer(4)">Don't Know</button>

</div>

<div id="stats">

<h3>Bucket 1 (Easy)</h3>
<div id="bucket1"></div>

<h3>Bucket 2 (OK)</h3>
<div id="bucket2"></div>

<h3>Bucket 3 (Hard)</h3>
<div id="bucket3"></div>

<h3>Bucket 4 (Don't Know)</h3>
<div id="bucket4"></div>

</div>

<script src="app.js"></script>
</body>
</html>
