<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JLPT Kanji Bucket Trainer</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>JLPT Kanji Trainer</h1>
<p>N5 + N4 | English / Tagalog</p>

<div id="card">

<h2 id="kanji">漢</h2>
<p id="reading">reading</p>
<p id="meaning">meaning</p>

</div>

<div class="buttons">

<button onclick="answer(1)">Easy</button>
<button onclick="answer(2)">OK</button>
<button onclick="answer(3)">Hard</button>
<button onclick="answer(4)">Don't Know</button>

</div>

<div id="stats"></div>

<script src="app.js"></script>

</body>
</html>
